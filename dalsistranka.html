<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taneční skupina Excelent</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #911d5a; /* Hlavní barva pozadí */
            color: #ffefc1; /* Sekundární barva */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 550px;
            text-align: center;
            border: 3px solid #ffefc1;
        }
        h2 {
            color: #911d5a;
            font-size: 2.2rem;
            margin-top: 0;
            text-transform: uppercase;
        }
        .intro-text {
            line-height: 1.6;
            color: #444;
            margin-bottom: 25px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .video-link {
            text-decoration: none;
            transition: 0.3s;
        }
        .thumbnail {
            width: 100%;
            border-radius: 12px;
            border: 3px solid #ffefc1;
            transition: 0.3s;
        }
        .video-link:hover .thumbnail {
            border-color: #911d5a;
            transform: translateY(-5px);
        }
        .video-label {
            display: block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #911d5a;
            font-weight: bold;
        }
        /* Tlačítko pro YouTube kanál */
        .yt-button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #911d5a;
            color: #ffefc1;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(145, 29, 90, 0.3);
        }
        .yt-button:hover {
            background-color: #721647;
            transform: scale(1.05);
        }
        .back-link {
            display: block;
            margin-top: 30px;
            color: #911d5a;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Excelent </h2>
        
        <p class="intro-text">
            Ahoj, my jsme taneční skupina <strong>Excelent</strong>. Tanci se věnujeme již 8 let. Poslední dobou se také věnujeme organizaci různých eventů, na kterých i vystupujeme. Můžete nás sledovat zde:
        </p>
        
        <div class="video-grid">

        </div>

        <!-- Tlačítko na YouTube kanál -->
        <a href="https://www.youtube.com/@excelentdancegroup/videos" target="_blank" class="yt-button">
            🎬 Celý YouTube kanál EXCELENT
        </a>

        <a href="index.html" class="back-link">← Zpět na moji vizitku</a>
    </div>

</body>
</html>
