<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O mně - A. Dosoudilová</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #53a1ac;
            color: #53a1ac;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #AC5E53;
            margin-bottom: 0.5rem;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        ul {
            list-style-type: none;
            padding: 0;
            line-height: 1.8;
        }
        .emoji {
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>A. Dosoudilova</h1>
        <p>Vítejte na mé vizitce!</p>
        <hr>
        <ul>
            <li><span class="emoji">🎂</span>Je mi <strong>18 let</strong></li>
            <li><span class="emoji">🐾</span>Mám <strong>1 kočku</strong> a <strong>2 psy</strong></li>
            <li><span class="emoji">💃</span>Mým velkým koníčkem je <strong>tancování</strong></li>
        </ul>
    </div>

</body>
</html>
